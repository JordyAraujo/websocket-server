services:
  websocket-server:
    build: .
    container_name: websocket-server
    ports:
      - "3001:3001"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development
    networks:
      - websocket-net
    restart: unless-stopped

networks:
  websocket-net:
    name: websocket-net
    driver: bridge
    attachable: true
